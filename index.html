<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Recognition System - LUTSK</title>
    <style>
        :root {
            --primary: #38bdf8;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
        }

        header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 40px;
        }

        #univ-logo {
            width: 80px;
            height: auto;
            filter: drop-shadow(0 0 10px rgba(56, 189, 248, 0.3));
        }

        h1 {
            font-size: 1.8rem;
            margin: 0;
            background: linear-gradient(90deg, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #start-btn {
            padding: 16px 40px;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--bg);
            background: var(--primary);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 15px -3px rgba(56, 189, 248, 0.4);
        }

        #start-btn:hover {
            transform: translateY(-2px);
            background: #7dd3fc;
        }

        #webcam-container {
            border: 3px solid var(--card);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            background: #000;
        }

        #label-container {
            margin-top: 30px;
            display: grid;
            gap: 12px;
            width: 100%;
            max-width: 400px;
        }

        .label-box {
            background: var(--card);
            padding: 16px 20px;
            border-radius: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #334155;
            transition: 0.4s;
            opacity: 0.4;
        }

        .label-box.active {
            opacity: 1;
            border-color: var(--primary);
            background: rgba(56, 189, 248, 0.05);
            transform: scale(1.02);
        }

        .class-name { font-weight: 500; }
        .probability { color: var(--primary); font-weight: 700; }
    </style>
</head>
<body>

    <header>
        <img id="univ-logo" src="Лого універу обрізаний.png" alt="ЛНУ">
        <h1>Система ідентифікації</h1>
    </header>

    <div id="controls">
        <button type="button" id="start-btn" onclick="init()">Запустити систему</button>
    </div>
    
    <div id="webcam-container"></div>
    <div id="label-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

    <script type="text/javascript">
        const URL = "./"; 
        let model, webcam, labelContainer, maxPredictions;
        let detectionTrackers = {};

        async function init() {
            // Видаляємо кнопку
            const btn = document.getElementById('start-btn');
            btn.parentNode.removeChild(btn);

            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";

            model = await tmImage.load(modelURL, metadataURL);
            maxPredictions = model.getTotalClasses();

            webcam = new tmImage.Webcam(400, 400, true);
            await webcam.setup();
            await webcam.play();
            window.requestAnimationFrame(loop);

            document.getElementById("webcam-container").appendChild(webcam.canvas);
            labelContainer = document.getElementById("label-container");
            
            for (let i = 0; i < maxPredictions; i++) {
                const className = model.getClassLabels()[i].toLowerCase();
                
                // 2. Клас повітря та спейс робимо прихованими (не додаємо в список)
                if (className.includes("повітря") || className.includes("space")) {
                    detectionTrackers[i] = { startTime: null, isAnnounced: false, hidden: true };
                    continue; 
                }

                const labelBox = document.createElement("div");
                labelBox.className = "label-box";
                labelBox.id = "box-" + i;
                labelContainer.appendChild(labelBox);
                detectionTrackers[i] = { startTime: null, isAnnounced: false, hidden: false };
            }
        }

        async function loop() {
            webcam.update();
            await predict();
            window.requestAnimationFrame(loop);
        }

        async function predict() {
            const prediction = await model.predict(webcam.canvas);
            const currentTime = Date.now();

            for (let i = 0; i < maxPredictions; i++) {
                const className = prediction[i].className;
                const probability = prediction[i].probability;
                const tracker = detectionTrackers[i];

                // Оновлюємо тільки видимі класи
                if (!tracker.hidden) {
                    const labelBox = document.getElementById("box-" + i);
                    labelBox.innerHTML = `
                        <span class="class-name">${className}</span>
                        <span class="probability">${(probability * 100).toFixed(0)}%</span>
                    `;

                    if (probability > 0.90) {
                        labelBox.classList.add('active');
                    } else {
                        labelBox.classList.remove('active');
                    }
                }

                // Логіка озвучки (1. Прибрано спейс і повітря)
                if (probability > 0.90) {
                    if (!tracker.startTime) tracker.startTime = currentTime;
                    
                    if (currentTime - tracker.startTime > 3000 && !tracker.isAnnounced) {
                        // Озвучуємо ТІЛЬКИ якщо це не повітря і не спейс
                        const lowerName = className.toLowerCase();
                        if (!lowerName.includes("повітря") && !lowerName.includes("space")) {
                            announceClass(className);
                            tracker.isAnnounced = true;
                        }
                    }
                } else {
                    tracker.startTime = null;
                    tracker.isAnnounced = false;
                }
            }
        }

        function announceClass(name) {
            const utterance = new SpeechSynthesisUtterance(`indificated: ${name}`);
            utterance.lang = 'uk-UA';
            window.speechSynthesis.speak(utterance);
        }
    </script>
</body>
</html>
