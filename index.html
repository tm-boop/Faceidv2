<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Recognition System - LUTSK</title>
    <style>
        :root {
            --primary: #38bdf8;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --accent: #6366f1;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        #univ-logo {
            width: 70px;
            height: auto;
            filter: drop-shadow(0 0 8px rgba(56, 189, 248, 0.3));
        }

        h1 {
            font-size: 1.5rem;
            margin: 0;
            background: linear-gradient(90deg, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-fill-color: transparent;
            text-transform: uppercase;
        }

        #start-btn {
            padding: 15px 40px;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--bg);
            background: var(--primary);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 20px;
        }

        #webcam-container {
            border: 3px solid var(--card);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            background: #000;
        }

        /* Список імен під камерою */
        #label-container {
            margin-top: 25px;
            display: grid;
            gap: 10px;
            width: 100%;
            max-width: 400px;
        }

        .label-box {
            background: var(--card);
            padding: 12px 20px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #334155;
            transition: 0.3s;
        }

        .label-box.active {
            border-color: var(--primary);
            background: rgba(56, 189, 248, 0.1);
            transform: scale(1.02);
        }

        /* Окремий блок для Space внизу */
        #footer-space {
            margin-top: auto;
            padding: 20px;
            width: 100%;
            display: flex;
            justify-content: center;
            border-top: 1px solid #334155;
            background: rgba(15, 23, 42, 0.8);
        }

        .space-indicator {
            padding: 10px 25px;
            border-radius: 30px;
            background: #1e293b;
            font-size: 0.9rem;
            color: #94a3b8;
            border: 1px dashed #475569;
        }

        .space-indicator.active {
            color: var(--accent);
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.2);
        }

        .probability { font-weight: 700; color: var(--primary); }
    </style>
</head>
<body>

    <header>
        <img id="univ-logo" src="Лого універу обрізаний.png" alt="Logo">
        <h1>Система ідентифікації</h1>
    </header>

    <button type="button" id="start-btn" onclick="init()">Запустити систему</button>
    
    <div id="webcam-container"></div>
    
    <div id="label-container"></div>

    <div id="footer-space">
        <div id="space-box" class="space-indicator">Очікування даних...</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

    <script type="text/javascript">
        const URL = "./"; 
        let model, webcam, labelContainer, maxPredictions;
        let detectionTrackers = {};

        async function init() {
            const btn = document.getElementById('start-btn');
            btn.style.display = 'none';

            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";

            model = await tmImage.load(modelURL, metadataURL);
            maxPredictions = model.getTotalClasses();

            webcam = new tmImage.Webcam(400, 400, true);
            await webcam.setup();
            await webcam.play();
            window.requestAnimationFrame(loop);

            document.getElementById("webcam-container").appendChild(webcam.canvas);
            labelContainer = document.getElementById("label-container");
            
            for (let i = 0; i < maxPredictions; i++) {
                const className = model.getClassLabels()[i].toLowerCase();
                
                // Створюємо трекери
                detectionTrackers[i] = { 
                    startTime: null, 
                    isAnnounced: false,
                    isSpace: className.includes("space"),
                    isAir: className.includes("повітря")
                };

                // Додаємо в основний список тільки якщо це НЕ Space і НЕ Повітря
                if (!detectionTrackers[i].isSpace && !detectionTrackers[i].isAir) {
                    const div = document.createElement("div");
                    div.className = "label-box";
                    div.id = "box-" + i;
                    labelContainer.appendChild(div);
                }
            }
        }

        async function loop() {
            webcam.update();
            await predict();
            window.requestAnimationFrame(loop);
        }

        async function predict() {
            const prediction = await model.predict(webcam.canvas);
            const currentTime = Date.now();

            for (let i = 0; i < maxPredictions; i++) {
                const className = prediction[i].className;
                const prob = prediction[i].probability;
                const tracker = detectionTrackers[i];

                // 1. Оновлення інтерфейсу
                if (tracker.isSpace) {
                    const spaceBox = document.getElementById("space-box");
                    spaceBox.innerHTML = `ТЕХНІЧНИЙ КЛАС [SPACE]: ${(prob * 100).toFixed(0)}%`;
                    prob > 0.90 ? spaceBox.classList.add('active') : spaceBox.classList.remove('active');
                } 
                else if (!tracker.isAir) {
                    const labelBox = document.getElementById("box-" + i);
                    if (labelBox) {
                        labelBox.innerHTML = `<span>${className}</span><span class="probability">${(prob * 100).toFixed(0)}%</span>`;
                        prob > 0.90 ? labelBox.classList.add('active') : labelBox.classList.remove('active');
                    }
                }

                // 2. Логіка озвучки (Тільки імена, ігноруємо Space та Повітря)
                if (prob > 0.90) {
                    if (!tracker.startTime) tracker.startTime = currentTime;
                    if (currentTime - tracker.startTime > 3000 && !tracker.isAnnounced) {
                        if (!tracker.isSpace && !tracker.isAir) {
                            announceClass(className);
                            tracker.isAnnounced = true;
                        }
                    }
                } else {
                    tracker.startTime = null;
                    tracker.isAnnounced = false;
                }
            }
        }

       function announceClass(name) {
            // Створюємо об'єкт мовлення
            const utterance = new SpeechSynthesisUtterance(`Identified: ${name}`);
            
            // Встановлюємо англійську мову (США)
            utterance.lang = 'en-US';
            
            // Налаштування швидкості (1.0 - нормальна)
            utterance.rate = 0.9;
            
            // Налаштування тональності (1.0 - нормальна)
            utterance.pitch = 1.0;

            window.speechSynthesis.speak(utterance);
        }
    </script>
</body>
</html>
