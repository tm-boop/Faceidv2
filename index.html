<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Recognition System - LUTSK</title>
    <style>
        :root {
            --primary: #38bdf8;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
        }

        header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 40px;
            animation: fadeIn 0.8s ease-out;
        }

        #univ-logo {
            width: 80px;
            height: auto;
            filter: drop-shadow(0 0 10px rgba(56, 189, 248, 0.3));
        }

        h1 {
            font-size: 1.8rem;
            margin: 0;
            background: linear-gradient(90deg, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #start-container {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        #start-btn {
            padding: 16px 40px;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--bg);
            background: var(--primary);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 15px -3px rgba(56, 189, 248, 0.4);
        }

        #start-btn:hover {
            transform: translateY(-2px);
            background: #7dd3fc;
            box-shadow: 0 20px 25px -5px rgba(56, 189, 248, 0.5);
        }

        #webcam-container {
            position: relative;
            border: 3px solid var(--card);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            background: #000;
            line-height: 0;
        }

        canvas {
            max-width: 100%;
            height: auto;
        }

        #label-container {
            margin-top: 30px;
            display: grid;
            gap: 12px;
            width: 100%;
            max-width: 400px;
        }

        .label-box {
            background: var(--card);
            padding: 16px 20px;
            border-radius: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #334155;
            transition: 0.4s;
            opacity: 0.5;
        }

        .label-box.active {
            opacity: 1;
            border-color: var(--primary);
            background: rgba(56, 189, 248, 0.05);
            transform: scale(1.02);
        }

        .class-name { font-weight: 500; }
        .probability { 
            font-family: 'JetBrains Mono', monospace; 
            font-weight: 700; 
            color: var(--primary);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <header>
        <img id="univ-logo" src="Лого універу обрізаний.png" alt="ЛНУ">
        <h1>Система ідентифікації</h1>
    </header>

    <div id="start-container">
        <button type="button" id="start-btn" onclick="init()">Запустити камеру</button>
    </div>
    
    <div id="webcam-container"></div>
    <div id="label-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

    <script type="text/javascript">
        const URL = "./"; 
        let model, webcam, labelContainer, maxPredictions;
        let detectionTrackers = {};

        async function init() {
            // ВИДАЛЯЄМО КНОПКУ ПОВНІСТЮ
            const startBtn = document.getElementById('start-btn');
            startBtn.parentNode.removeChild(startBtn);

            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";

            try {
                model = await tmImage.load(modelURL, metadataURL);
                maxPredictions = model.getTotalClasses();

                const flip = true;
                webcam = new tmImage.Webcam(400, 400, flip);
                await webcam.setup();
                await webcam.play();
                window.requestAnimationFrame(loop);

                document.getElementById("webcam-container").appendChild(webcam.canvas);
                labelContainer = document.getElementById("label-container");
                
                for (let i = 0; i < maxPredictions; i++) {
                    const labelBox = document.createElement("div");
                    labelBox.className = "label-box";
                    labelContainer.appendChild(labelBox);
                    detectionTrackers[i] = { startTime: null, isAnnounced: false };
                }
            } catch (e) {
                console.error("Помилка ініціалізації:", e);
                alert("Не вдалося завантажити камеру або модель.");
            }
        }

        async function loop() {
            webcam.update();
            await predict();
            window.requestAnimationFrame(loop);
        }

        async function predict() {
            const prediction = await model.predict(webcam.canvas);
            const currentTime = Date.now();

            for (let i = 0; i < maxPredictions; i++) {
                const className = prediction[i].className;
                const probability = prediction[i].probability;
                const labelBox = labelContainer.childNodes[i];

                labelBox.innerHTML = `
                    <span class="class-name">${className}</span>
                    <span class="probability">${(probability * 100).toFixed(0)}%</span>
                `;

                if (probability > 0.90) {
                    labelBox.classList.add('active');
                    if (!detectionTrackers[i].startTime) detectionTrackers[i].startTime = currentTime;
                    
                    if (currentTime - detectionTrackers[i].startTime > 3000 && !detectionTrackers[i].isAnnounced) {
                        announceClass(className);
                        detectionTrackers[i].isAnnounced = true;
                    }
                } else {
                    labelBox.classList.remove('active');
                    detectionTrackers[i].startTime = null;
                    detectionTrackers[i].isAnnounced = false;
                }
            }
        }

        function announceClass(name) {
            if (name.toLowerCase().includes("повітря")) return;
            const utterance = new SpeechSynthesisUtterance(`Впізнано: ${name}`);
            utterance.lang = 'uk-UA';
            utterance.rate = 0.9; // Трохи повільніша, чітка дикція
            window.speechSynthesis.speak(utterance);
        }
    </script>
</body>
</html>
