<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI System - LUTSK</title>
    <style>
        :root {
            --primary: #38bdf8;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --accent: #6366f1;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 0;
        }

        /* Навігація */
        nav {
            width: 100%;
            background: #1e293b;
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 15px 0;
            border-bottom: 1px solid #334155;
        }

        nav a {
            color: #94a3b8;
            text-decoration: none;
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 8px;
            transition: 0.3s;
        }

        nav a.active {
            color: var(--primary);
            background: rgba(56, 189, 248, 0.1);
        }

        nav a:hover { color: white; }

        header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin: 30px 0;
        }

        #univ-logo {
            width: 70px;
            height: auto;
            filter: drop-shadow(0 0 8px rgba(56, 189, 248, 0.3));
        }

        h1 {
            font-size: 1.5rem;
            margin: 0;
            background: linear-gradient(90deg, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        #start-btn {
            padding: 15px 40px;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--bg);
            background: var(--primary);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 20px;
        }

        #webcam-container {
            border: 3px solid var(--card);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            background: #000;
        }

        #label-container {
            margin-top: 25px;
            display: grid;
            gap: 10px;
            width: 100%;
            max-width: 400px;
            padding: 0 20px;
        }

        .label-box {
            background: var(--card);
            padding: 12px 20px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #334155;
            transition: 0.3s;
        }

        .label-box.active {
            border-color: var(--primary);
            background: rgba(56, 189, 248, 0.1);
            transform: scale(1.02);
        }

        #footer-space {
            margin-top: auto;
            padding: 20px;
            width: 100%;
            display: flex;
            justify-content: center;
            border-top: 1px solid #334155;
            background: rgba(15, 23, 42, 0.8);
        }

        .space-indicator {
            padding: 10px 25px;
            border-radius: 30px;
            background: #1e293b;
            font-size: 0.9rem;
            color: #94a3b8;
            transition: 0.3s;
        }

        .space-indicator.active { 
            color: var(--accent); 
            border: 1px dashed var(--accent); 
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="active">Ідентифікація</a>
        <a href="emotions.html">Аналіз емоцій</a>
    </nav>

    <header>
        <img id="univ-logo" src="Лого універу обрізаний.png" alt="Logo">
        <h1>Система ідентифікації</h1>
    </header>

    <button type="button" id="start-btn" onclick="init()">Запустити систему</button>
    
    <div id="webcam-container"></div>
    <div id="label-container"></div>

    <div id="footer-space">
        <div id="space-box" class="space-indicator">Очікування SPACE...</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

    <script type="text/javascript">
        const URL = "./"; 
        let model, webcam, labelContainer, maxPredictions;
        let detectionTrackers = {};

        async function init() {
            // Прибираємо кнопку старт
            const startBtn = document.getElementById('start-btn');
            if(startBtn) startBtn.parentNode.removeChild(startBtn);

            model = await tmImage.load(URL + "model.json", URL + "metadata.json");
            maxPredictions = model.getTotalClasses();

            webcam = new tmImage.Webcam(400, 400, true);
            await webcam.setup();
            await webcam.play();
            window.requestAnimationFrame(loop);

            document.getElementById("webcam-container").appendChild(webcam.canvas);
            labelContainer = document.getElementById("label-container");
            
            for (let i = 0; i < maxPredictions; i++) {
                const className = model.getClassLabels()[i].toLowerCase();
                detectionTrackers[i] = { 
                    startTime: null, 
                    isAnnounced: false,
                    isSpace: className.includes("space"),
                    isAir: className.includes("повітря")
                };

                // Додаємо в список лише імена
                if (!detectionTrackers[i].isSpace && !detectionTrackers[i].isAir) {
                    const div = document.createElement("div");
                    div.className = "label-box";
                    div.id = "box-" + i;
                    labelContainer.appendChild(div);
                }
            }
        }

        async function loop() {
            webcam.update();
            await predict();
            window.requestAnimationFrame(loop);
        }

        async function predict() {
            const prediction = await model.predict(webcam.canvas);
            const currentTime = Date.now();

            for (let i = 0; i < maxPredictions; i++) {
                const className = prediction[i].className;
                const prob = prediction[i].probability;
                const tracker = detectionTrackers[i];

                if (tracker.isSpace) {
                    const spaceBox = document.getElementById("space-box");
                    spaceBox.innerHTML = `КЛАС [SPACE]: ${(prob * 100).toFixed(0)}%
